steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=gcr.io/$PROJECT_ID/cam-combiner-worker:latest
      - --dockerfile=Dockerfile
      - --context=dir://.
      - --cache=true
      - --cache-ttl=168h
      - --compressed-caching=false

images:
  - gcr.io/$PROJECT_ID/cam-combiner-worker:latest
