name: Verify Frontend Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify build artifact exists
        working-directory: frontend
        run: |
          if [ ! -f build/index.html ]; then
            echo "ERROR: build/index.html not found in frontend. Ensure build step ran successfully.";
            ls -la . || true;
            ls -la build || true;
            exit 1;
          fi

      - name: Run verify script (optional)
        run: npm run verify:frontend-build || true
