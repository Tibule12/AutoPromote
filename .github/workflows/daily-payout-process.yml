name: "Daily Process Payouts (Sandbox only)"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC

jobs:
  process-payouts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run payout processor (sandbox)
        env:
          NODE_ENV: "development"
          PAYPAL_MODE: "sandbox"
          PAYOUTS_ENABLED: "true"
          ENABLE_BACKGROUND_JOBS: "false"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON$FIREBASE_SERVICE_ACCOUNT_BASE64" ] || { [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_PRIVATE_KEY" ] && [ -n "$FIREBASE_CLIENT_EMAIL" ]; }; then
            node scripts/process-pending-payouts.js
          else
            echo 'WARNING: no complete Firebase service account secrets defined - workflow will be a dry-run'
            PAYOUTS_DRY_RUN=true node scripts/process-pending-payouts.js --dry-run
          fi
